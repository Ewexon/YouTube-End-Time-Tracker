<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 16px;
    }
    h2 { margin-top: 0; font-size: 18px; color: #ff0000; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; }
    .tab { cursor: pointer; opacity: 0.5; font-size: 14px; font-weight: bold; }
    .tab.active { opacity: 1; color: #ff0000; }
    .section { display: none; }
    .section.active { display: block; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    select, input { width: 100%; background: #222; border: 1px solid #333; color: white; padding: 6px; border-radius: 4px; }
    .history-item { font-size: 11px; padding: 8px; border-bottom: 1px solid #222; }
    .history-item:last-child { border-bottom: none; }
    .history-title { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { color: #666; margin-top: 2px; }
    .btn-clear { background: #ff000022; color: #ff4444; border: 1px solid #ff444444; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>YT EndTime Pro</h2>
  
  <div class="tabs">
    <div class="tab active" data-tab="settings">Settings</div>
    <div class="tab" data-tab="history">History</div>
  </div>

  <div id="settings" class="section active">
    <div class="field">
      <label>Time Format</label>
      <select id="timeFormat">
        <option value="24h">24-Hour</option>
        <option value="12h">12-Hour (AM/PM)</option>
      </select>
    </div>
    <div class="field">
      <label>Text Color</label>
      <input type="color" id="color" value="#ffffff">
    </div>
    <div class="field">
      <label>Display Mode</label>
      <select id="mode">
        <option value="control-bar">Control Bar Integration</option>
        <option value="overlay">Floating Overlay (Legacy)</option>
      </select>
    </div>
  </div>

  <div id="history" class="section">
    <div id="historyList"></div>
    <button class="btn-clear" id="clearHistory">Clear History</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
